<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Fitness Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <style>
    :root{--bg:#f8fafc;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--dark:#020617}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{min-height:100vh}
    .app{max-width:460px;margin:0 auto;padding:14px 14px 28px}
    .hidden{display:none!important}
    .hero{background:linear-gradient(180deg,#0f172a,#111827);color:#fff;border-radius:28px;padding:16px;box-shadow:0 12px 30px rgba(15,23,42,.18)}
    .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.row-center{display:flex;gap:8px;align-items:center}
    .small{font-size:.86rem}.tiny{font-size:.75rem}.muted{color:#cbd5e1}.muted-dark{color:#64748b}
    .hero h1{margin:4px 0 0;font-size:1.55rem}.hero p{margin:8px 0 0}
    .icon-btn{border:none;background:rgba(255,255,255,.1);color:#fff;border-radius:18px;padding:12px;cursor:pointer}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.stat{background:rgba(255,255,255,.1);border-radius:18px;padding:12px}.stat .label{font-size:.75rem;color:#cbd5e1}.stat .value{font-size:1.06rem;font-weight:800;margin-top:4px}
    .hero-compact{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;font-size:.8rem;color:#cbd5e1}
    .card{background:var(--card);border-radius:28px;padding:16px;box-shadow:0 3px 18px rgba(15,23,42,.06);margin-top:14px}
    .card h2{margin:0;font-size:1.12rem}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#fff;border-radius:18px;padding:4px;box-shadow:0 3px 18px rgba(15,23,42,.06);margin-top:14px}
    .tab{border:none;background:transparent;padding:10px 6px;border-radius:14px;font-weight:700;color:#475569;cursor:pointer}.tab.active{background:#0f172a;color:#fff}
    .badge{padding:6px 10px;border-radius:999px;font-size:.75rem;font-weight:700;border:1px solid transparent}
    .badge-corsa{background:#ffedd5;color:#c2410c;border-color:#fed7aa}.badge-tonificazione{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}.badge-recupero{background:#dcfce7;color:#15803d;border-color:#bbf7d0}.badge-light{background:#f3e8ff;color:#7c3aed;border-color:#e9d5ff}.badge-riposo{background:#f1f5f9;color:#475569;border-color:#e2e8f0}
    .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day-btn{border:1px solid var(--line);background:#fff;padding:12px 4px;border-radius:16px;font-weight:700;color:#475569;cursor:pointer}.day-btn.active{background:#0f172a;border-color:#0f172a;color:#fff}
    .session-overview{background:#f8fafc;border-radius:18px;padding:14px}.task{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid #f1f5f9;border-radius:18px;background:#fff}.task input{margin-top:3px;transform:scale(1.1)}
    .btn{border:none;border-radius:18px;padding:13px 14px;font-weight:700;cursor:pointer;background:#0f172a;color:#fff}.btn-outline{background:#fff;color:#0f172a;border:1px solid var(--line)}.btn.active{background:#0f172a;color:#fff}.btn-light{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.18)}
    .mode-grid,.action-grid,.stat-grid{display:grid;gap:10px}.mode-grid.two,.action-grid.two,.stat-grid.two{grid-template-columns:repeat(2,1fr)}
    .progress-meta{display:flex;justify-content:space-between;font-size:.86rem;color:#64748b;margin-bottom:8px}.progress{height:11px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress>span{display:block;height:100%;background:#0f172a;border-radius:999px}
    .mini-card{background:#fff;border-radius:24px;padding:14px;box-shadow:0 3px 18px rgba(15,23,42,.06)} .mini-card .value{font-size:1.6rem;font-weight:800}
    .week-item{border:1px solid #f1f5f9;border-radius:18px;background:#fff;padding:14px}.week-head{display:flex;justify-content:space-between;gap:8px}.week-left{display:flex;gap:10px}.icon-pill{width:34px;height:34px;border-radius:14px;background:#f1f5f9;display:grid;place-items:center;font-size:1rem}
    input[type="text"],textarea{width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--line);font:inherit;background:#fff}textarea{min-height:110px;resize:vertical}
    .field{display:grid;gap:8px}.energy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .note-box{background:#f8fafc;border-radius:18px;padding:12px;font-size:.92rem;color:#334155}.chart{display:grid;gap:10px}.chart-row{display:grid;grid-template-columns:38px 1fr 50px;gap:10px;align-items:center}.bar{height:10px;border-radius:999px;background:#e2e8f0;overflow:hidden}.bar>span{display:block;height:100%;background:#0f172a}
    .install-tip{margin-top:12px;padding:12px;border-radius:18px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;font-size:.88rem}
    .overlay{position:fixed;inset:0;z-index:50;background:var(--dark);color:#fff;padding:18px 16px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column;justify-content:space-between}
    .overlay .phase{font-size:2.6rem;font-weight:800;margin-top:10px;line-height:1.05}.overlay .detail{font-size:1.15rem;color:#cbd5e1;margin-top:10px}.timer{font-size:min(22vw,5.2rem);font-weight:900;text-align:center;letter-spacing:-.04em;margin:28px 0}.big-val{font-size:3.2rem;font-weight:900}.exercise{font-size:2.2rem;font-weight:800;line-height:1.1;margin-top:10px}.overlay-top{display:flex;justify-content:space-between;align-items:center}.overlay-bottom{display:grid;gap:14px}.safe-space{padding-top:env(safe-area-inset-top)}
  </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const STORAGE_KEY='fitness-pwa-state-v4';
const PLAN_CONFIG={
 meta:{title:'Rientro progressivo',subtitle:'Obiettivo: tonificazione generale + perdita peso graduale',targetWeight:'60–62 kg',profileLabel:'51 anni',profileSubtitle:'Ripartenza progressiva'},
 sessionTypes:{
  Corsa:{badgeClass:'badge-corsa',icon:'👟',supportsTimedMode:true,manualSteps:[{label:'Riscaldamento',detail:'5 min camminata veloce'},{label:'Blocco centrale',detail:'1 min corsa + 2 min camminata × 6'},{label:'Defaticamento',detail:'5 min camminata lenta'},{label:'Stretching',detail:'5 min mobilità e allungamento'}],timedSequence:[{phase:'CAMMINATA',detail:'Riscaldamento',seconds:300,taskIndex:0},...Array.from({length:6}).flatMap((_,i)=>[{phase:'CORSA',detail:`Ripetizione ${i+1} / 6`,seconds:60,taskIndex:1},{phase:'CAMMINATA',detail:`Recupero ${i+1} / 6`,seconds:120,taskIndex:1}]),{phase:'CAMMINATA',detail:'Defaticamento',seconds:300,taskIndex:2},{phase:'STRETCHING',detail:'Mobilità finale',seconds:300,taskIndex:3}]},
  Tonificazione:{badgeClass:'badge-tonificazione',icon:'🏋️',supportsTimedMode:false},
  Recupero:{badgeClass:'badge-recupero',icon:'🌿',supportsTimedMode:true,manualSteps:[{label:'Camminata',detail:'20–30 min a passo sciolto'},{label:'Mobilità',detail:'5–10 min stretching'}],timedSequence:[{phase:'CAMMINATA',detail:'Passeggiata rigenerante',seconds:1200,taskIndex:0},{phase:'MOBILITÀ',detail:'Stretching finale',seconds:300,taskIndex:1}]},
  Light:{badgeClass:'badge-light',icon:'💜',supportsTimedMode:true,manualSteps:[{label:'Attività leggera',detail:'Camminata lunga o corsa molto leggera'}],timedSequence:[{phase:'LIGHT',detail:'Camminata lunga o corsa leggera',seconds:2400,taskIndex:0}]},
  Riposo:{badgeClass:'badge-riposo',icon:'🌙',supportsTimedMode:false}
 },
 days:[
  {day:'Lun',fullDay:'Lunedì',type:'Corsa',goal:'Run/Walk 1+2 × 6',duration:25,tasks:['5 min camminata veloce','1 min corsa + 2 min camminata × 6','5 min defaticamento','Stretching 5 min']},
  {day:'Mar',fullDay:'Martedì',type:'Tonificazione',goal:'Circuito full body × 3 giri',duration:30,roundsTarget:3,tasks:['Squat × 12','Push-up × 8','Affondi × 8/gamba','Plank 20 sec','Glute bridge × 12'],exerciseTimers:{3:20}},
  {day:'Mer',fullDay:'Mercoledì',type:'Recupero',goal:'Camminata + mobilità',duration:25,tasks:['Camminata 20–30 min','Stretching 5–10 min']},
  {day:'Gio',fullDay:'Giovedì',type:'Corsa',goal:'Run/Walk 1+2 × 6',duration:25,tasks:['5 min camminata veloce','1 min corsa + 2 min camminata × 6','5 min defaticamento']},
  {day:'Ven',fullDay:'Venerdì',type:'Tonificazione',goal:'Circuito full body × 3 giri',duration:30,roundsTarget:3,tasks:['Squat × 12','Push-up × 8','Affondi × 8/gamba','Plank 20 sec','Glute bridge × 12'],exerciseTimers:{3:20}},
  {day:'Sab',fullDay:'Sabato',type:'Light',goal:'Camminata lunga o corsa leggera',duration:45,tasks:['Camminata 40–60 min oppure corsa molto leggera']},
  {day:'Dom',fullDay:'Domenica',type:'Riposo',goal:'Riposo totale',duration:0,tasks:['Solo movimento leggero quotidiano']}
 ],
 historyData:[{week:'W1',weight:69.8,score:62},{week:'W2',weight:69.2,score:75},{week:'W3',weight:68.8,score:81},{week:'W4',weight:68.3,score:84}]
};
const badgeClass=t=>PLAN_CONFIG.sessionTypes[t]?.badgeClass||'badge-riposo';
const iconFor=t=>PLAN_CONFIG.sessionTypes[t]?.icon||'🔥';
const supportsTimedMode=t=>!!PLAN_CONFIG.sessionTypes[t]?.supportsTimedMode;
const getManualSteps=t=>PLAN_CONFIG.sessionTypes[t]?.manualSteps||[];
const getTimedSequence=t=>PLAN_CONFIG.sessionTypes[t]?.timedSequence||[];
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const defaultCompletion=()=>Object.fromEntries(PLAN_CONFIG.days.map((d,i)=>[i,d.tasks.map(()=>false)]));
const defaultRounds=()=>Object.fromEntries(PLAN_CONFIG.days.map((d,i)=>d.roundsTarget?[i,0]:null).filter(Boolean));
const defaultState=()=>({tab:'oggi',selectedDay:0,completion:defaultCompletion(),rounds:defaultRounds(),weight:'68.3',energy:'media',notes:'Ginocchia ok. Ritmo corsa da tenere molto tranquillo.',guided:false,runningMode:'timed',sessionStep:0,circuitIndex:0,timerRunning:false,timerIndex:0,timeLeft:getTimedSequence(PLAN_CONFIG.days[0].type)[0]?.seconds||0,sound:true,exerciseTimerRunning:false,exerciseTimeLeft:0,deferredInstall:null,installPromptVisible:false,headerCollapsed:true});
let state=loadState(),timerHandle=null,exerciseHandle=null;
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?{...defaultState(),...JSON.parse(raw)}:defaultState()}catch{return defaultState()}}
function persist(){const c={...state};delete c.deferredInstall;localStorage.setItem(STORAGE_KEY,JSON.stringify(c))}
async function beep(freq=880,dur=.12){if(!state.sound)return;try{const C=window.AudioContext||window.webkitAudioContext;if(!C)return;const ctx=beep.ctx||(beep.ctx=new C());if(ctx.state==='suspended')await ctx.resume();const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=freq;g.gain.value=.05;o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch{}}
async function unlockAudio(){try{await beep(620,.06)}catch{}}
async function vibrate(pattern=[120]){try{if(navigator.vibrate)navigator.vibrate(pattern)}catch{}}
async function requestWakeLock(){try{if('wakeLock' in navigator){if(requestWakeLock.lock)await requestWakeLock.lock.release().catch(()=>{});requestWakeLock.lock=await navigator.wakeLock.request('screen')}}catch{}}
async function releaseWakeLock(){try{if(requestWakeLock.lock){await requestWakeLock.lock.release();requestWakeLock.lock=null}}catch{}}
function currentDay(){return PLAN_CONFIG.days[state.selectedDay]}
function taskArray(){return state.completion[state.selectedDay]||[]}
function progressForDay(dayIndex){const d=PLAN_CONFIG.days[dayIndex],done=state.completion[dayIndex]||[];const tr=done.length?done.filter(Boolean).length/done.length:0;const rr=d.roundsTarget?Math.min((state.rounds[dayIndex]||0)/d.roundsTarget,1):1;return Math.round((d.type==='Tonificazione'?(tr+rr)/2:tr)*100)}
function weeklyStats(){let doneSessions=0,total=0,minutes=0;PLAN_CONFIG.days.forEach((d,i)=>{const done=state.completion[i]||[];const tc=done.length>0&&done.every(Boolean);const rc=d.roundsTarget?(state.rounds[i]||0)>=d.roundsTarget:true;const complete=tc&&rc;if(d.type!=='Riposo')total++;if(d.type!=='Riposo'&&complete)doneSessions++;const tr=done.length?done.filter(Boolean).length/done.length:0;const rr=d.roundsTarget?Math.min((state.rounds[i]||0)/d.roundsTarget,1):1;minutes+=Math.round(d.duration*(d.type==='Tonificazione'?(tr+rr)/2:tr))});const adherence=total?Math.round(doneSessions/total*100):0;const streak=adherence>=80?3:adherence>=60?2:1;const energyScore=state.energy==='alta'?90:state.energy==='media'?75:55;const fitnessScore=Math.round((adherence+Math.min(minutes,180)/1.8+energyScore)/3);return{adherence,minutes,streak,fitnessScore}}
function stopIntervals(){clearInterval(timerHandle);clearInterval(exerciseHandle);timerHandle=null;exerciseHandle=null}
function ensureTimedInterval(){stopIntervals();if(!state.guided||!state.timerRunning||!supportsTimedMode(currentDay().type))return;timerHandle=setInterval(()=>{if(state.timeLeft>1){state.timeLeft--;if(state.timeLeft<=5){beep(880,.05);vibrate(60)}persist();render();return}beep(1040,.16);vibrate([160,80,160]);const seq=getTimedSequence(currentDay().type),step=seq[state.timerIndex],tasks=taskArray().slice();if(typeof step?.taskIndex==='number'&&step.taskIndex<tasks.length)tasks[step.taskIndex]=true;state.completion[state.selectedDay]=tasks;if(state.timerIndex<seq.length-1){state.timerIndex++;state.timeLeft=seq[state.timerIndex].seconds}else{state.timerRunning=false;state.guided=false;state.timerIndex=0;state.timeLeft=seq[0]?.seconds||0;releaseWakeLock()}persist();render()},1000)}
function ensureExerciseInterval(){clearInterval(exerciseHandle);exerciseHandle=null;if(!state.guided||currentDay().type!=='Tonificazione'||!state.exerciseTimerRunning||state.exerciseTimeLeft<=0)return;exerciseHandle=setInterval(()=>{if(state.exerciseTimeLeft>1){state.exerciseTimeLeft--;if(state.exerciseTimeLeft<=5){beep(820,.05);vibrate(50)}persist();render();return}beep(760,.12);vibrate([120,60,120]);state.exerciseTimerRunning=false;state.exerciseTimeLeft=0;persist();render()},1000)}
function selectDay(i){state.selectedDay=i;state.guided=false;state.sessionStep=0;state.circuitIndex=0;state.timerRunning=false;state.timerIndex=0;state.timeLeft=getTimedSequence(currentDay().type)[0]?.seconds||0;state.exerciseTimerRunning=false;state.exerciseTimeLeft=0;persist();stopIntervals();render()}
function markTask(i,val){const arr=taskArray().slice();arr[i]=val;state.completion[state.selectedDay]=arr;persist();render()}
function resetDay(dayIndex){const d=PLAN_CONFIG.days[dayIndex];state.completion[dayIndex]=d.tasks.map(()=>false);if(d.roundsTarget)state.rounds[dayIndex]=0;if(dayIndex===state.selectedDay){state.guided=false;state.sessionStep=0;state.circuitIndex=0;state.timerRunning=false;state.timerIndex=0;state.timeLeft=getTimedSequence(d.type)[0]?.seconds||0;state.exerciseTimerRunning=false;state.exerciseTimeLeft=0}persist();stopIntervals();releaseWakeLock();render()}
async function startSession(){const d=currentDay();if(d.type==='Riposo')return;await unlockAudio();await requestWakeLock();state.guided=true;state.headerCollapsed=true;state.sessionStep=0;state.circuitIndex=0;state.timerIndex=0;state.timeLeft=getTimedSequence(d.type)[0]?.seconds||0;state.timerRunning=supportsTimedMode(d.type)&&state.runningMode==='timed';state.exerciseTimerRunning=false;state.exerciseTimeLeft=d.exerciseTimers?.[0]||0;persist();render();if(state.timerRunning)ensureTimedInterval()}
function exitSession(){state.guided=false;state.sessionStep=0;state.circuitIndex=0;state.timerRunning=false;state.timerIndex=0;state.timeLeft=getTimedSequence(currentDay().type)[0]?.seconds||0;state.exerciseTimerRunning=false;state.exerciseTimeLeft=0;persist();stopIntervals();releaseWakeLock();render()}
function completeManualStep(){const steps=getManualSteps(currentDay().type);if(!steps.length)return;const arr=taskArray().slice();const idx=Math.min(state.sessionStep,arr.length-1);if(idx>=0)arr[idx]=true;state.completion[state.selectedDay]=arr;beep(880,.1);vibrate(80);if(state.sessionStep<steps.length-1)state.sessionStep++;else{state.guided=false;state.sessionStep=0;releaseWakeLock()}persist();render()}
function completeCircuitExercise(){const d=currentDay(),idx=state.circuitIndex,arr=taskArray().slice();arr[idx]=true;state.completion[state.selectedDay]=arr;beep(900,.1);vibrate(80);if(idx<d.tasks.length-1){state.circuitIndex++;state.exerciseTimeLeft=d.exerciseTimers?.[state.circuitIndex]||0;state.exerciseTimerRunning=false;persist();render();return}const nr=Math.min((state.rounds[state.selectedDay]||0)+1,d.roundsTarget||0);state.rounds[state.selectedDay]=nr;if(nr<(d.roundsTarget||0)){state.completion[state.selectedDay]=d.tasks.map(()=>false);state.circuitIndex=0;state.exerciseTimeLeft=d.exerciseTimers?.[0]||0;state.exerciseTimerRunning=false;vibrate([140,80,140])}else{state.guided=false;state.circuitIndex=0;state.exerciseTimeLeft=0;state.exerciseTimerRunning=false;vibrate([180,100,180]);releaseWakeLock()}persist();render()}
function skipTimedStep(){const seq=getTimedSequence(currentDay().type),step=seq[state.timerIndex],arr=taskArray().slice();if(typeof step?.taskIndex==='number'&&step.taskIndex<arr.length)arr[step.taskIndex]=true;state.completion[state.selectedDay]=arr;beep(980,.1);vibrate(80);if(state.timerIndex<seq.length-1){state.timerIndex++;state.timeLeft=seq[state.timerIndex].seconds}else{state.guided=false;state.timerRunning=false;state.timerIndex=0;state.timeLeft=seq[0]?.seconds||0;releaseWakeLock()}persist();render()}
function installApp(){if(state.deferredInstall){state.deferredInstall.prompt();state.deferredInstall.userChoice.finally(()=>{state.installPromptVisible=false;persist();render()})}}
function render(){const day=currentDay(),stats=weeklyStats(),app=document.getElementById('app'),progress=progressForDay(state.selectedDay),steps=getManualSteps(day.type),seq=getTimedSequence(day.type),timed=seq[state.timerIndex];
  app.innerHTML=`
    ${!state.guided?`<section class="hero"><div class="row"><div><div class="small muted">Fitness dashboard</div><h1>${PLAN_CONFIG.meta.title}</h1>${state.headerCollapsed?'':`<p class="muted">${PLAN_CONFIG.meta.subtitle}</p>`}</div><div class="row-center"><button class="icon-btn" id="soundToggle">${state.sound?'🔊':'🔇'}</button><button class="icon-btn" id="headerToggle">${state.headerCollapsed?'▾':'▴'}</button></div></div>${state.headerCollapsed?`<div class="hero-compact"><span>Peso ${state.weight} kg</span><span>•</span><span>Score ${stats.fitnessScore}</span><span>•</span><span>Streak ${stats.streak}</span></div>`:`<div class="stats"><div class="stat"><div class="label">Peso</div><div class="value">${state.weight} kg</div></div><div class="stat"><div class="label">Score</div><div class="value">${stats.fitnessScore}</div></div><div class="stat"><div class="label">Streak</div><div class="value">${stats.streak} sett.</div></div></div>`}${state.installPromptVisible?`<div class="install-tip">Questa versione è pronta per essere installata: usa il pulsante qui sotto oppure il menu del browser.</div><div style="margin-top:10px"><button class="btn" id="installBtn" style="width:100%">Installa la web app</button></div>`:''}</section>`:''}
    ${state.guided&&day.type==='Tonificazione'?`<section class="overlay safe-space"><div><div class="overlay-top"><span class="badge">Circuito</span><button class="btn btn-light" id="exitSession">Esci</button></div><div style="margin-top:22px"><div class="small muted">Giro</div><div class="big-val">${Math.min((state.rounds[state.selectedDay]||0)+1,day.roundsTarget)} / ${day.roundsTarget}</div></div><div style="margin-top:24px"><div class="small muted">Esercizio corrente</div><div class="exercise">${day.tasks[state.circuitIndex]}</div></div>${day.exerciseTimers?.[state.circuitIndex]?`<div style="margin-top:24px"><div class="small muted">Timer esercizio</div><div class="big-val" style="font-size:2.4rem">${fmt(state.exerciseTimeLeft||day.exerciseTimers[state.circuitIndex])}</div><div style="margin-top:12px"><button class="btn btn-light" id="toggleExerciseTimer">${state.exerciseTimerRunning?'Pausa timer':'Avvia timer'}</button></div></div>`:''}</div><div class="overlay-bottom"><div><div class="progress-meta"><span class="muted">Avanzamento giro</span><span class="muted">${state.circuitIndex+1}/${day.tasks.length}</span></div><div class="progress"><span style="width:${((state.circuitIndex+1)/day.tasks.length)*100}%"></span></div></div><button class="btn" id="circuitDone" style="width:100%;padding:16px 14px;font-size:1.1rem">Fatto</button></div></section>`:''}
    ${state.guided&&day.type!=='Tonificazione'&&state.runningMode==='timed'&&supportsTimedMode(day.type)?`<section class="overlay safe-space"><div><div class="overlay-top"><span class="badge">Timer automatico</span><button class="btn btn-light" id="exitSession">Esci</button></div><div style="margin-top:24px"><div class="small muted">Fase</div><div class="phase">${timed?.phase||''}</div><div class="detail">${timed?.detail||''}</div></div><div class="timer">${fmt(state.timeLeft)}</div></div><div class="overlay-bottom"><div><div class="progress-meta"><span class="muted">Avanzamento sessione</span><span class="muted">${state.timerIndex+1}/${seq.length}</span></div><div class="progress"><span style="width:${((state.timerIndex+1)/seq.length)*100}%"></span></div></div><div class="action-grid" style="grid-template-columns:repeat(3,1fr)"><button class="btn btn-light" id="pauseTimer">⏯</button><button class="btn btn-light" id="skipTimer">⏭</button><button class="btn" id="stopSession">Stop</button></div></div></section>`:''}
    ${state.guided&&day.type!=='Tonificazione'&&!(state.runningMode==='timed'&&supportsTimedMode(day.type))?`<section class="overlay safe-space"><div><div class="overlay-top"><span class="badge">Modalità manuale</span><button class="btn btn-light" id="exitSession">Esci</button></div><div style="margin-top:24px"><div class="small muted">Step corrente</div><div class="phase">${steps[state.sessionStep]?.label||''}</div><div class="detail">${steps[state.sessionStep]?.detail||''}</div></div></div><div class="overlay-bottom"><div><div class="progress-meta"><span class="muted">Avanzamento sessione</span><span class="muted">${state.sessionStep+1}/${steps.length}</span></div><div class="progress"><span style="width:${((state.sessionStep+1)/steps.length)*100}%"></span></div></div><button class="btn" id="manualDone" style="width:100%;padding:16px 14px;font-size:1.1rem">Step completato</button></div></section>`:''}
    ${!state.guided?`<nav class="tabs">${['oggi','settimana','metriche','storico'].map(t=>`<button class="tab ${state.tab===t?'active':''}" data-tab="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</nav>`:''}
    ${!state.guided?`<section class="${state.tab==='oggi'?'':'hidden'}"><div class="card"><div class="row"><div><h2>Allenamento del giorno</h2><div class="small muted-dark">Vista dettagliata prima della sessione, essenziale durante l’esecuzione</div></div><span class="badge ${badgeClass(day.type)}">${day.type}</span></div><div class="day-grid" style="margin-top:14px">${PLAN_CONFIG.days.map((d,i)=>`<button class="day-btn ${state.selectedDay===i?'active':''}" data-day="${i}">${d.day}</button>`).join('')}</div><div class="session-overview" style="margin-top:14px"><div class="row"><div><div class="small muted-dark">${day.fullDay}</div><div style="font-weight:800;font-size:1.08rem">${day.goal}</div></div><div style="font-size:1.3rem">${iconFor(day.type)}</div></div><div class="small muted-dark" style="margin-top:10px">⏱ ${day.duration} minuti stimati</div></div>${supportsTimedMode(day.type)?`<div class="task" style="margin-top:14px;display:block"><div class="small muted-dark" style="margin-bottom:10px">Modalità sessione</div><div class="mode-grid two"><button class="btn-outline btn ${state.runningMode==='manual'?'active':''}" id="modeManual">Manuale</button><button class="btn-outline btn ${state.runningMode==='timed'?'active':''}" id="modeTimed">Timer automatico</button></div></div>`:''}${day.type==='Tonificazione'?`<div class="task" style="margin-top:14px;display:block"><div class="row"><div><div class="small muted-dark">Giri completati</div><div style="font-weight:800;font-size:1.1rem">${state.rounds[state.selectedDay]||0} / ${day.roundsTarget}</div></div><div class="small muted-dark" style="text-align:right">Esercizio corrente<br><strong style="color:#0f172a">${day.tasks[state.circuitIndex]}</strong></div></div></div>`:''}<div style="display:grid;gap:10px;margin-top:14px">${day.tasks.map((task,i)=>`<label class="task"><input type="checkbox" data-task="${i}" ${taskArray()[i]?'checked':''}><span>${task}</span></label>`).join('')}</div><div style="margin-top:10px"><div class="progress-meta"><span>Completamento del giorno</span><span>${progress}%</span></div><div class="progress"><span style="width:${progress}%"></span></div></div><div class="action-grid two" style="margin-top:14px"><button class="btn" id="startSession">▶ ${day.type==='Tonificazione'?'Modalità circuito':(state.runningMode==='timed'&&supportsTimedMode(day.type)?'Sessione con timer':'Modalità guidata')}</button><button class="btn btn-outline" id="resetDay">↺ Reset</button></div></div></section>`:''}
    ${!state.guided?`<section class="${state.tab==='settimana'?'':'hidden'}"><div class="stat-grid two" style="margin-top:14px"><div class="mini-card"><div class="small muted-dark">Aderenza</div><div class="value">${stats.adherence}%</div><div class="tiny muted-dark">Target consigliato ≥ 80%</div></div><div class="mini-card"><div class="small muted-dark">Carico</div><div class="value">${stats.minutes} min</div><div class="tiny muted-dark">Range ideale 120–180 min</div></div></div><div class="card"><h2>Piano settimanale</h2><div style="display:grid;gap:10px;margin-top:14px">${PLAN_CONFIG.days.map((d,i)=>{const prog=progressForDay(i);return `<div class="week-item"><div class="week-head"><div class="week-left"><div class="icon-pill">${iconFor(d.type)}</div><div><div style="font-weight:700">${d.fullDay}</div><div class="small muted-dark">${d.goal}</div>${d.roundsTarget?`<div class="tiny muted-dark">Giri: ${state.rounds[i]||0}/${d.roundsTarget}</div>`:''}</div></div><div style="text-align:right"><div style="font-weight:700">${prog}%</div><div class="tiny muted-dark">${(state.completion[i]||[]).filter(Boolean).length}/${d.tasks.length} step</div></div></div><div class="progress" style="margin-top:10px"><span style="width:${prog}%"></span></div></div>`}).join('')}</div></div></section>`:''}
    ${!state.guided?`<section class="${state.tab==='metriche'?'':'hidden'}"><div class="stat-grid two" style="margin-top:14px"><div class="mini-card"><div class="small muted-dark">Peso target</div><div class="value">${PLAN_CONFIG.meta.targetWeight}</div><div class="tiny muted-dark">Obiettivo 3–5 mesi</div></div><div class="mini-card"><div class="small muted-dark">Età / profilo</div><div class="value">${PLAN_CONFIG.meta.profileLabel}</div><div class="tiny muted-dark">${PLAN_CONFIG.meta.profileSubtitle}</div></div></div><div class="card"><h2>Aggiorna le metriche</h2><div class="field" style="margin-top:14px"><label class="small muted-dark">Peso attuale</label><input type="text" id="weightInput" value="${state.weight}" /></div><div class="field" style="margin-top:14px"><label class="small muted-dark">Energia percepita</label><div class="energy-grid">${['bassa','media','alta'].map(v=>`<button class="btn-outline btn ${state.energy===v?'active':''}" data-energy="${v}">${v[0].toUpperCase()+v.slice(1)}</button>`).join('')}</div></div><div class="field" style="margin-top:14px"><label class="small muted-dark">Note</label><textarea id="notesInput">${state.notes}</textarea></div></div><div class="card"><h2>Diagnostica</h2><div class="note-box" style="margin-top:12px">${stats.fitnessScore>=80?'Settimana in buona traiettoria. Puoi mantenere il carico attuale.':stats.fitnessScore>=60?'Settimana discreta. Conviene consolidare prima di aumentare il volume.':'Carico o costanza da rivedere. Meglio semplificare il piano e ripartire da una baseline sostenibile.'}</div><div class="note-box" style="margin-top:10px">Se energia bassa o compaiono fastidi articolari, non aumentare né corsa né volume esercizi nella settimana successiva.</div></div></section>`:''}
    ${!state.guided?`<section class="${state.tab==='storico'?'':'hidden'}"><div class="stat-grid two" style="margin-top:14px"><div class="mini-card"><div class="small muted-dark">Trend peso</div><div class="value">-1.5 kg</div><div class="tiny muted-dark">Ultime 4 settimane</div></div><div class="mini-card"><div class="small muted-dark">Miglior score</div><div class="value">84</div><div class="tiny muted-dark">Aderenza in crescita</div></div></div><div class="card"><h2>Andamento settimanale</h2><div class="chart">${PLAN_CONFIG.historyData.map(r=>`<div class="chart-row"><div class="small muted-dark">${r.week}</div><div class="bar"><span style="width:${r.score}%"></span></div><div class="small">${r.weight}kg</div></div>`).join('')}</div></div><div class="card"><h2>Configurazione del piano</h2><div class="note-box" style="margin-top:12px">Il piano è data-driven: giorni, tipi di sessione, step manuali, sequenze temporizzate e timer esercizi vivono nella configurazione centrale.</div><div class="note-box" style="margin-top:10px">Prossimo passo naturale: spostare questa configurazione in un JSON esterno con validazione.</div></div></section>`:''}
  `;
  bindEvents();
}
function bindEvents(){document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{state.tab=el.dataset.tab;persist();render()});document.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>selectDay(Number(el.dataset.day)));document.querySelectorAll('[data-task]').forEach(el=>el.onchange=()=>markTask(Number(el.dataset.task),el.checked));document.getElementById('soundToggle')?.addEventListener('click',()=>{state.sound=!state.sound;persist();render()});document.getElementById('headerToggle')?.addEventListener('click',()=>{state.headerCollapsed=!state.headerCollapsed;persist();render()});document.getElementById('installBtn')?.addEventListener('click',installApp);document.getElementById('modeManual')?.addEventListener('click',()=>{state.runningMode='manual';persist();render()});document.getElementById('modeTimed')?.addEventListener('click',()=>{state.runningMode='timed';persist();render()});document.getElementById('startSession')?.addEventListener('click',startSession);document.getElementById('resetDay')?.addEventListener('click',()=>resetDay(state.selectedDay));document.getElementById('exitSession')?.addEventListener('click',exitSession);document.getElementById('stopSession')?.addEventListener('click',exitSession);document.getElementById('pauseTimer')?.addEventListener('click',async()=>{await unlockAudio();state.timerRunning=!state.timerRunning;persist();render();ensureTimedInterval()});document.getElementById('skipTimer')?.addEventListener('click',skipTimedStep);document.getElementById('manualDone')?.addEventListener('click',completeManualStep);document.getElementById('circuitDone')?.addEventListener('click',completeCircuitExercise);document.getElementById('toggleExerciseTimer')?.addEventListener('click',async()=>{await unlockAudio();state.exerciseTimerRunning=!state.exerciseTimerRunning;persist();render();ensureExerciseInterval()});document.getElementById('weightInput')?.addEventListener('input',e=>{state.weight=e.target.value;persist()});document.getElementById('notesInput')?.addEventListener('input',e=>{state.notes=e.target.value;persist()});document.querySelectorAll('[data-energy]').forEach(el=>el.onclick=()=>{state.energy=el.dataset.energy;persist();render()})}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();state.deferredInstall=e;state.installPromptVisible=true;render()});
window.addEventListener('appinstalled',()=>{state.installPromptVisible=false;state.deferredInstall=null;persist();render()});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&state.guided){requestWakeLock()}else if(document.visibilityState==='hidden'){releaseWakeLock()}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'))}
render();
</script>
</body>
</html>
